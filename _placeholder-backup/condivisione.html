<!doctype html>
<html lang="it" data-palette="navy">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Documento condiviso · Appaltare.com</title>
  <meta name="description" content="Documento sigillato condiviso su Appaltare: impronta SHA-256 e data certa ancorata a Bitcoin."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap"/>
  <style>
:root{
  --bg:oklch(0.985 0.005 250);--surface:#fff;--ink:oklch(0.22 0.03 250);--ink-2:oklch(0.42 0.03 250);--ink-3:oklch(0.55 0.025 250);
  --line:oklch(0.90 0.012 250);--brand-700:oklch(0.32 0.08 250);--brand-600:oklch(0.42 0.10 250);--brand-500:oklch(0.55 0.16 250);
  --ok-600:oklch(0.52 0.14 150);--ok-50:oklch(0.97 0.025 150);--ok-line:oklch(0.62 0.14 150);--amber-600:oklch(0.66 0.16 75);
  --red-600:oklch(0.56 0.20 25);--red-50:oklch(0.97 0.025 25);
  --font-sans:"Geist",system-ui,sans-serif;--font-mono:"Geist Mono",ui-monospace,monospace;
  --r-md:8px;--r-lg:12px;--r-xl:16px;--shadow:0 2px 4px rgba(15,23,42,.06),0 12px 32px -8px rgba(15,23,42,.10);
}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-sans);line-height:1.5}
.wrap{max-width:640px;margin:0 auto;padding:56px 24px 80px}
.eyebrow{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--brand-500)}
h1{font-size:28px;font-weight:700;letter-spacing:-.02em;margin:8px 0 20px;color:var(--brand-700)}
.result{border-radius:var(--r-lg);padding:26px;box-shadow:var(--shadow)}
.result.ok{border:1px solid var(--ok-line);background:#fff}.result.no{border:1px solid var(--red-600);background:var(--red-50)}
.result h3{margin:0 0 16px;font-size:20px}.result.ok h3{color:var(--ok-600)}.result.no h3{color:var(--red-600)}
.kv{display:flex;gap:10px;font-size:14px;padding:9px 0;border-bottom:1px solid rgba(0,0,0,.05)}
.kv span:first-child{min-width:140px;color:var(--ink-3);font-weight:600}
.kv code{font-family:var(--font-mono);font-size:12px;word-break:break-all}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:600}
.badge.conf{background:var(--ok-600);color:#fff}.badge.pend{background:var(--amber-600);color:#fff}
.links{margin-top:18px}.links a{color:var(--brand-600);font-weight:600;font-size:14px;text-decoration:none}
.muted{color:var(--ink-3)}
  </style>
</head>
<body>
  <div class="wrap">
    <nav style="display:flex;gap:18px;margin-bottom:20px;font-size:14px">
      <a href="/veylon.html" onclick="if(history.length>1){history.back();return false}" style="color:var(--brand-600);text-decoration:none;font-weight:600">← Indietro</a>
      <a href="/veylon.html" style="margin-left:auto;color:var(--brand-600);text-decoration:none;font-weight:600">Veylon · home</a>
    </nav>
    <div class="eyebrow">Drive · Appaltare</div>
    <h1>Documento condiviso</h1>
    <div id="out"><p class="muted">Caricamento…</p></div>
  </div>
  <script>
const SUPABASE_URL='https://efhdooeqscqncgvhqfyu.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmaGRvb2Vxc2NxbmNndmhxZnl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDA3NTcsImV4cCI6MjA5MDYxNjc1N30.wtvxgipTgEPpz40Vo6qZBsPXQO1vQuz4F1GwF9bCNlM';
const FN=SUPABASE_URL+'/functions/v1/drive-shared';
const FN_CERT=SUPABASE_URL+'/functions/v1/veylon-certificato';
const out=document.getElementById('out');
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
(async()=>{
  const t=new URLSearchParams(location.search).get('t');
  if(!t){out.innerHTML='<div class="result no"><h3>Link mancante</h3></div>';return;}
  try{
    const res=await fetch(FN,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON},body:JSON.stringify({token:t})});
    const j=await res.json();
    if(!j.success||!j.valido){out.innerHTML=`<div class="result no"><h3>Non disponibile</h3><p>${esc(j.messaggio||'Link non valido.')}</p></div>`;return;}
    const conf=j.ancorato_su_bitcoin;
    out.innerHTML=`<div class="result ok"><h3>✓ ${esc(j.doc_name)}</h3>
      ${j.nota?`<p class="muted">${esc(j.nota)}</p>`:''}
      <div class="kv"><span>SHA-256</span><code>${j.sha256}</code></div>
      <div class="kv"><span>Ancoraggio</span>${conf?'<span class="badge conf">Confermato su Bitcoin</span>':'<span class="badge pend">In conferma</span>'}</div>
      ${j.btc_block_height?`<div class="kv"><span>Blocco Bitcoin</span><code>#${j.btc_block_height}</code></div>`:''}
      <div class="kv"><span>Data certa</span><code>${j.data_certa?new Date(j.data_certa).toLocaleString('it-IT'):'—'}</code></div>
      <div class="links"><a href="${FN_CERT}?h=${j.sha256}" target="_blank">Scarica certificato PDF →</a></div>
    </div>`;
  }catch(err){out.innerHTML=`<div class="result no"><h3>Errore</h3><p>${esc(String(err.message||err))}</p></div>`;}
})();
  </script>
</body>
</html>
