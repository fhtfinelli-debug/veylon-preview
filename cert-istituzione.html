<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>VEYLON Cert · La tua istituzione</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://hanxxxtgxofjkfdjegfe.supabase.co; script-src 'self' 'unsafe-inline' https://esm.sh https://cdn.skypack.dev https://plausible.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://hanxxxtgxofjkfdjegfe.supabase.co; connect-src 'self' https://hanxxxtgxofjkfdjegfe.supabase.co https://plausible.io; font-src 'self' data: https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none';"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>html.veylon-auth-pending body { visibility: hidden; }</style>
</head>
<body>
  <header class="masthead">
    <div class="masthead-inner">
      <div class="masthead-meta"><span>Area riservata</span><span class="sep">·</span><span>La tua istituzione</span></div>
      <a href="dashboard.html" class="wordmark">VEYLON</a>
      <nav class="masthead-nav full">
        <a href="dashboard.html">Cruscotto</a>
        <a href="cert.html">Cert</a>
        <a href="cert-istituzione.html" class="current">Istituzione</a>
        <a href="#" id="logout" class="nav-aux">Esci</a>
      </nav>
    </div>
  </header>

  <main class="col" style="padding: 40px 32px 96px;">
    <section class="head-row">
      <div>
        <span class="section-num">Veylon Cert · Istituzione</span>
        <h1 class="serif" style="font-size: clamp(38px, 4.6vw, 56px); line-height: 1.05; letter-spacing: -0.02em; margin: 14px 0 18px;">
          La tua <em class="serif-italic" style="color: var(--seal);">istituzione.</em>
        </h1>
        <p class="lede">Profilo dell'ente che emette certificati.</p>
      </div>
    </section>

    <section style="margin-top: 40px;">
      <article class="panel-card">
        <div id="state-loading" class="state-msg">Caricamento profilo&hellip;</div>
        <div id="state-error" class="state-msg state-err" hidden><span></span></div>
        <div id="state-empty" class="state-msg" hidden>
          Non hai ancora registrato un'istituzione.
        </div>
        <form id="form" hidden>
          <div>
            <label class="field-label" for="nome">Ragione sociale <span style="color:var(--seal)">*</span></label>
            <input class="field-input" type="text" id="nome" required/>
          </div>
          <div style="margin-top: 18px;">
            <label class="field-label" for="tipo">Tipologia ente <span style="color:var(--seal)">*</span></label>
            <select class="field-input" id="tipo" required>
              <option value="">Seleziona…</option>
              <option value="universita">Università</option>
              <option value="scuola">Scuola</option>
              <option value="azienda_pharma">Azienda farmaceutica</option>
              <option value="ospedale">Ospedale</option>
              <option value="asl">ASL</option>
              <option value="ente_ricerca">Ente di ricerca</option>
              <option value="ordine_professionale">Ordine professionale</option>
              <option value="consorzio">Consorzio</option>
              <option value="ente_formazione">Ente di formazione</option>
              <option value="altro">Altro</option>
            </select>
          </div>
          <div style="margin-top: 18px;">
            <label class="field-label" for="settore">Settore <span style="color:var(--seal)">*</span></label>
            <select class="field-input" id="settore" required>
              <option value="">Seleziona…</option>
              <option value="formazione">Formazione / accademia</option>
              <option value="pharma">Pharma</option>
              <option value="sanitario">Sanitario</option>
              <option value="ricerca">Ricerca scientifica</option>
            </select>
          </div>
          <div style="margin-top: 18px;">
            <label class="field-label" for="piva">P. IVA <span style="color:var(--seal)">*</span></label>
            <input class="field-input mono" type="text" id="piva" required/>
          </div>
          <div style="margin-top: 18px;">
            <label class="field-label" for="sede">Sede legale</label>
            <input class="field-input" type="text" id="sede"/>
          </div>
          <div style="margin-top: 18px;">
            <label class="field-label" for="pec">Email istituzionale</label>
            <input class="field-input mono" type="email" id="pec"/>
          </div>
          <div style="margin-top: 18px;">
            <label class="field-label" for="accred">Riferimento di accreditamento</label>
            <input class="field-input" type="text" id="accred" placeholder="Es. ECM Agenas, ENAC, MUR…"/>
          </div>
          <button type="submit" class="btn seal lg" id="submit" style="margin-top: 24px;">
            <span class="btn-label">Salva profilo</span>
          </button>
        </form>
      </article>
    </section>
  </main>

  <footer class="footer"><div class="footer-base"><span>© MMXXVI · Veylon S.r.l.</span><span>Profilo istituzione</span></div></footer>

  <style>
  .head-row { padding-bottom: 32px; border-bottom: 1px solid var(--ink); }
  .panel-card { background: var(--paper); border: 1px solid var(--rule); padding: 24px 26px; }
  .state-msg { padding: 18px 0; color: var(--ink-2); font-family: var(--serif); font-style: italic; font-size: 15px; }
  .state-msg.state-err { color: var(--seal); }
  </style>

  <script type="module">
  import { protectPage, bindLogout } from "./_shared/auth-guard.js";
  import { supabase } from "./_shared/supabase-client.js";
  let user;
  document.documentElement.classList.add("veylon-auth-pending");
  try { ({ user } = await protectPage()); } finally { document.documentElement.classList.remove("veylon-auth-pending"); }
  bindLogout("#logout");

  let currentId = null;

  async function load() {
    document.getElementById("state-loading").hidden = false;
    document.getElementById("state-error").hidden = true;
    document.getElementById("state-empty").hidden = true;
    document.getElementById("form").hidden = true;
    try {
      const { data, error } = await supabase
        .from("cert_istituzioni")
        .select("id, ragione_sociale, tipo, settore, p_iva, contatti")
        .limit(1)
        .maybeSingle();
      document.getElementById("state-loading").hidden = true;
      if (error && !/relation|does not exist/i.test(error.message)) {
        const err = document.getElementById("state-error");
        err.querySelector("span").textContent = "Errore: " + error.message;
        err.hidden = false;
        return;
      }
      // Mostra form vuoto se non c'e' istituzione (creazione), oppure popolato (modifica)
      if (data) {
        currentId = data.id;
        const contatti = data.contatti || {};
        document.getElementById("nome").value = data.ragione_sociale || "";
        document.getElementById("tipo").value = data.tipo || "";
        document.getElementById("settore").value = data.settore || "";
        document.getElementById("piva").value = data.p_iva || "";
        document.getElementById("sede").value = contatti.sede || "";
        document.getElementById("pec").value = contatti.email || "";
        document.getElementById("accred").value = contatti.accreditamento || "";
      } else {
        document.getElementById("state-empty").hidden = false;
      }
      document.getElementById("form").hidden = false;
    } catch (e) {
      document.getElementById("state-loading").hidden = true;
      const err = document.getElementById("state-error");
      err.querySelector("span").textContent = "Errore: " + (e.message || e);
      err.hidden = false;
    }
  }

  document.getElementById("form").addEventListener("submit", async (ev) => {
    ev.preventDefault();
    const ragione_sociale = document.getElementById("nome").value.trim();
    const tipo = document.getElementById("tipo").value;
    const settore = document.getElementById("settore").value;
    const p_iva = document.getElementById("piva").value.trim();
    const sede = document.getElementById("sede").value.trim();
    const email = document.getElementById("pec").value.trim();
    const accreditamento = document.getElementById("accred").value.trim();
    if (!ragione_sociale) { alert("Ragione sociale obbligatoria."); return; }
    if (!tipo) { alert("Seleziona la tipologia ente."); return; }
    if (!settore) { alert("Seleziona il settore."); return; }
    if (!p_iva) { alert("P. IVA obbligatoria."); return; }
    const contatti = {};
    if (sede) contatti.sede = sede;
    if (email) contatti.email = email;
    if (accreditamento) contatti.accreditamento = accreditamento;
    const payload = {
      ragione_sociale,
      tipo,
      settore,
      p_iva,
      contatti,
    };
    const btn = document.getElementById("submit");
    btn.disabled = true;
    try {
      let res;
      if (currentId) {
        res = await supabase.from("cert_istituzioni").update(payload).eq("id", currentId);
      } else {
        res = await supabase.from("cert_istituzioni").insert({ ...payload, user_id: user.id });
      }
      if (res.error) throw res.error;
      alert("Profilo salvato.");
      load();
    } catch (e) {
      alert("Errore: " + (e.message || e));
    } finally {
      btn.disabled = false;
    }
  });
  load();
  </script>
</body>
</html>
