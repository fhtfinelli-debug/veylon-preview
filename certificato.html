<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>VEYLON · Certificato</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://hanxxxtgxofjkfdjegfe.supabase.co; script-src 'self' 'unsafe-inline' https://esm.sh https://cdn.skypack.dev https://plausible.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://hanxxxtgxofjkfdjegfe.supabase.co; connect-src 'self' https://hanxxxtgxofjkfdjegfe.supabase.co https://plausible.io; font-src 'self' data: https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none';"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <header class="masthead">
    <div class="masthead-inner">
      <div class="masthead-meta"><span>Area riservata</span><span class="sep">·</span><span>Dettaglio certificato</span></div>
      <a href="dashboard.html" class="wordmark">VEYLON</a>
      <nav class="masthead-nav full">
        <a href="dashboard.html">Cruscotto</a>
        <a href="cert.html">Cert</a>
        <a href="cert-mio.html">I miei</a>
        <a href="#" id="logout" class="nav-aux">Esci</a>
      </nav>
    </div>
  </header>

  <main class="col-narrow" style="padding: 40px 32px 96px;">
    <div id="state-loading" class="state-msg">Caricamento certificato&hellip;</div>
    <div id="state-error" class="state-msg state-err" hidden><span></span></div>
    <div id="state-empty" class="state-msg" hidden>
      Certificato non trovato o non accessibile.
    </div>

    <article id="cert-card" class="panel-card" hidden>
      <div class="cert-head">
        <div class="seal-mark"><span class="glyph">V</span></div>
        <div>
          <span class="eyebrow seal-c">Certificato</span>
          <h1 class="serif" id="cert-titolo" style="font-size: clamp(28px, 3.6vw, 40px); margin: 8px 0 0;">—</h1>
        </div>
      </div>
      <hr class="rule" style="margin: 24px 0;"/>
      <dl class="kv">
        <dt>Destinatario</dt><dd id="cert-dest">—</dd>
        <dt>Istituzione</dt><dd id="cert-ist">—</dd>
        <dt>Emesso il</dt><dd id="cert-emesso" class="mono">—</dd>
        <dt>Scadenza</dt><dd id="cert-scadenza" class="mono">—</dd>
        <dt>Codice</dt><dd id="cert-codice" class="mono">—</dd>
        <dt>Stato</dt><dd><span id="cert-stato" class="pill">—</span></dd>
      </dl>
      <div style="margin-top: 24px;">
        <a id="cert-verifica" class="btn ghost" href="#">Pagina di verifica pubblica</a>
      </div>
    </article>
  </main>

  <footer class="footer"><div class="footer-base"><span>© MMXXVI · Veylon S.r.l.</span><span>Certificato</span></div></footer>

  <style>
  .panel-card { background: var(--paper); border: 1px solid var(--rule); padding: 32px; }
  .state-msg { padding: 18px 0; color: var(--ink-2); font-family: var(--serif); font-style: italic; font-size: 15px; text-align: center; }
  .state-msg.state-err { color: var(--seal); }
  .cert-head { display: grid; grid-template-columns: 56px 1fr; gap: 18px; align-items: center; }
  .seal-mark { width: 56px; height: 56px; }
  .seal-mark .glyph { font-size: 22px; }
  .kv { display: grid; grid-template-columns: 160px 1fr; gap: 12px 24px; font-size: 14px; }
  .kv dt { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); padding-top: 4px; }
  .kv dd { margin: 0; font-family: var(--serif); }
  .kv dd.mono { font-family: var(--mono); font-size: 12px; }
  .pill { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; padding: 3px 8px; border: 1px solid var(--rule); display: inline-block; text-transform: uppercase; }
  .pill.ok { color: var(--verify); border-color: var(--verify); }
  .pill.warn { color: var(--seal); border-color: var(--seal); }
  </style>

  <script type="module">
  import { protectPage, bindLogout } from "./_shared/auth-guard.js";
  import { supabase } from "./_shared/supabase-client.js";
  await protectPage();
  bindLogout("#logout");

  function escapeHtml(s) { return String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }
  function fmt(d) { return d ? new Date(d).toLocaleString("it-IT", { dateStyle: "short", timeStyle: "short" }) : "—"; }

  const params = new URLSearchParams(window.location.search);
  const codice = params.get("codice") || params.get("id");

  async function load() {
    if (!codice) {
      document.getElementById("state-loading").hidden = true;
      document.getElementById("state-empty").hidden = false;
      return;
    }
    try {
      // prova entrambe le tabelle (emessi / a_mio_nome)
      let { data, error } = await supabase
        .from("cert_emessi")
        .select("id, titolo, destinatario_nome, istituzione_nome, codice, stato, created_at, scadenza")
        .eq("codice", codice)
        .maybeSingle();

      if ((!data || error) && (!error || /relation|does not exist/i.test(error.message))) {
        const r2 = await supabase
          .from("cert_a_mio_nome")
          .select("id, titolo, destinatario_nome, istituzione_nome, codice, stato, emesso_il, scadenza")
          .eq("codice", codice)
          .maybeSingle();
        data = r2.data; error = r2.error;
        if (data) data.created_at = data.emesso_il;
      }

      document.getElementById("state-loading").hidden = true;
      if (error) {
        const err = document.getElementById("state-error");
        err.querySelector("span").textContent = "Errore: " + error.message;
        err.hidden = false;
        return;
      }
      if (!data) {
        document.getElementById("state-empty").hidden = false;
        return;
      }
      document.getElementById("cert-titolo").textContent = data.titolo || "Certificato";
      document.getElementById("cert-dest").textContent = data.destinatario_nome || "—";
      document.getElementById("cert-ist").textContent = data.istituzione_nome || "—";
      document.getElementById("cert-emesso").textContent = fmt(data.created_at);
      document.getElementById("cert-scadenza").textContent = data.scadenza ? fmt(data.scadenza) : "—";
      document.getElementById("cert-codice").textContent = data.codice || "—";
      const st = data.stato || "valido";
      const ok = /valido|emesso|attivo/i.test(st);
      const stEl = document.getElementById("cert-stato");
      stEl.textContent = st;
      stEl.classList.add(ok ? "ok" : "warn");
      document.getElementById("cert-verifica").href = "cert-verifica.html?codice=" + encodeURIComponent(data.codice || "");
      document.getElementById("cert-card").hidden = false;
    } catch (e) {
      document.getElementById("state-loading").hidden = true;
      const err = document.getElementById("state-error");
      err.querySelector("span").textContent = "Errore: " + (e.message || e);
      err.hidden = false;
    }
  }
  load();
  </script>
</body>
</html>
