<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>VEYLON Mail · Email certificate</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://hanxxxtgxofjkfdjegfe.supabase.co; script-src 'self' 'unsafe-inline' https://esm.sh https://cdn.skypack.dev https://plausible.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://hanxxxtgxofjkfdjegfe.supabase.co; connect-src 'self' https://hanxxxtgxofjkfdjegfe.supabase.co https://plausible.io; font-src 'self' data: https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none';"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>html.veylon-auth-pending body { visibility: hidden; }</style>
</head>
<body>
  <main class="col" style="padding: 40px 32px 96px;">
    <section class="head-row">
      <div>
        <span class="section-num">Veylon Mail</span>
        <h1 class="serif" style="font-size: clamp(38px, 4.6vw, 56px); line-height: 1.05; letter-spacing: -0.02em; margin: 14px 0 18px;">
          Email <em class="serif-italic" style="color: var(--seal);">certificate.</em>
        </h1>
        <p class="lede">Ogni email che invii viene tracciata, marcata temporalmente e archiviata.</p>
      </div>
    </section>

    <section style="margin-top: 40px;">
      <article class="panel-card">
        <h2 class="serif" style="font-size: 22px; margin: 0 0 14px;">Le tue email certificate</h2>
        <div id="state-loading" class="state-msg">Caricamento email&hellip;</div>
        <div id="state-error" class="state-msg state-err" hidden>
          <span></span> <button class="link-seal" id="retry" type="button">Riprova</button>
        </div>
        <div id="state-empty" class="state-msg" hidden>
          Non hai ancora inviato email certificate.
          <a href="invia.html" class="link-seal">Apri una trasmissione &rarr;</a>
        </div>
        <table class="t" id="tbl" hidden>
          <thead><tr><th>Data</th><th>Destinatario</th><th>Oggetto</th><th>Stato</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </article>
    </section>
  </main>

  <footer class="footer"><div class="footer-base"><span>© MMXXVI · Veylon S.r.l.</span><span>Email certificate</span></div></footer>

  <style>
  .head-row { padding-bottom: 32px; border-bottom: 1px solid var(--ink); }
  .panel-card { background: var(--paper); border: 1px solid var(--rule); padding: 24px 26px; }
  .state-msg { padding: 18px 0; color: var(--ink-2); font-family: var(--serif); font-style: italic; font-size: 15px; }
  .state-msg.state-err { color: var(--seal); }
  .t { width: 100%; border-collapse: collapse; font-size: 13px; }
  .t th { text-align: left; padding: 10px 12px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); border-bottom: 1px solid var(--rule); }
  .t td { padding: 12px; border-bottom: 1px solid var(--rule-2); font-family: var(--serif); }
  .t td.mono { font-family: var(--mono); font-size: 11.5px; }
  .pill { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; padding: 3px 8px; border: 1px solid var(--rule); display: inline-block; text-transform: uppercase; }
  .pill.ok { color: var(--verify); border-color: var(--verify); }
  .pill.warn { color: var(--seal); border-color: var(--seal); }
  </style>

  <script type="module">
  import { protectPage, bindLogout } from "./_shared/auth-guard.js";
  import { renderAppShell } from "./_shared/app-shell.js";
  import { supabase } from "./_shared/supabase-client.js";

  document.documentElement.classList.add("veylon-auth-pending");

  try {

    await protectPage();

  } finally {

    document.documentElement.classList.remove("veylon-auth-pending");

  }
  await renderAppShell("mail");

  function escapeHtml(s) { return String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }
  function fmt(d) { return d ? new Date(d).toLocaleString("it-IT", { dateStyle: "short", timeStyle: "short" }) : ""; }

  async function load() {
    document.getElementById("state-loading").hidden = false;
    document.getElementById("state-error").hidden = true;
    document.getElementById("state-empty").hidden = true;
    document.getElementById("tbl").hidden = true;
    document.getElementById("rows").innerHTML = "";
    try {
      const { data, error } = await supabase
        .from("email_certificate")
        .select("id, destinatari_to, oggetto, consegna_stato, data_invio")
        .order("data_invio", { ascending: false })
        .limit(50);
      document.getElementById("state-loading").hidden = true;
      if (error) {
        const err = document.getElementById("state-error");
        err.querySelector("span").textContent = "Errore: " + error.message;
        err.hidden = false;
        return;
      }
      if (!data || data.length === 0) {
        document.getElementById("state-empty").hidden = false;
        return;
      }
      const tbody = document.getElementById("rows");
      data.forEach(m => {
        const stato = m.consegna_stato || "in coda";
        const ok = /consegnata|delivered|recapitata/i.test(stato);
        const to = Array.isArray(m.destinatari_to) ? m.destinatari_to : [];
        const dest = to.length === 0 ? "—" : (to.length === 1 ? to[0] : `${to[0]} +${to.length - 1}`);
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${fmt(m.data_invio)}</td>
          <td class="mono">${escapeHtml(dest)}</td>
          <td>${escapeHtml(m.oggetto || "—")}</td>
          <td><span class="pill ${ok ? "ok" : "warn"}">${escapeHtml(stato)}</span></td>
        `;
        tbody.appendChild(tr);
      });
      document.getElementById("tbl").hidden = false;
    } catch (e) {
      document.getElementById("state-loading").hidden = true;
      const err = document.getElementById("state-error");
      err.querySelector("span").textContent = "Errore: " + (e.message || e);
      err.hidden = false;
    }
  }
  document.getElementById("retry").addEventListener("click", load);
  load();
  </script>
</body>
</html>
