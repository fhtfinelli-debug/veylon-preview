  <style>
    /* === Suite PDF — layout in stile Stirling-PDF home === */
    .sp-search { position: relative; max-width: 640px; margin: 28px auto 16px; }
    .sp-search input { width: 100%; padding: 14px 16px 14px 46px; font: inherit; font-size: 15px; border: 1px solid var(--rule); border-radius: 999px; background: var(--paper); color: var(--ink); transition: border-color 120ms; }
    .sp-search input:focus { outline: none; border-color: var(--seal); box-shadow: 0 0 0 3px oklch(70% 0.1 30 / 0.15); }
    .sp-search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--ink-3); pointer-events: none; }
    .sp-pills { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 900px; margin: 0 auto 32px; padding: 0 16px; }
    .sp-pill { padding: 7px 14px; font: inherit; font-size: 13px; border: 1px solid var(--rule); border-radius: 999px; background: var(--paper); color: var(--ink-2); cursor: pointer; transition: all 120ms; white-space: nowrap; }
    .sp-pill:hover { border-color: var(--seal); color: var(--ink); }
    .sp-pill.is-active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .sp-pill-count { font-family: var(--mono); font-size: 11px; opacity: 0.7; margin-left: 4px; }
    .sp-section-h { font-family: var(--serif); font-size: 22px; margin: 32px 0 16px; color: var(--ink); }
    .sp-section-h em { color: var(--seal); font-style: italic; }
    .sp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
    .sp-grid.is-empty { display: block; padding: 48px 16px; text-align: center; color: var(--ink-3); font-family: var(--mono); font-size: 13px; }
    .sp-card { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; padding: 18px; border: 1px solid var(--rule); border-radius: 10px; background: var(--paper); cursor: pointer; text-align: left; transition: all 150ms ease; font-family: inherit; min-height: 130px; position: relative; }
    .sp-card:hover { border-color: var(--seal); transform: translateY(-2px); box-shadow: 0 8px 24px -12px oklch(20% 0.05 30 / 0.25); }
    .sp-card-icon { width: 32px; height: 32px; color: var(--seal); flex-shrink: 0; }
    .sp-card-icon svg { width: 100%; height: 100%; }
    .sp-card-tag { position: absolute; top: 10px; right: 12px; font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.08em; color: var(--ink-3); text-transform: uppercase; }
    .sp-card-name { font-family: var(--serif); font-size: 16px; line-height: 1.2; color: var(--ink); margin-top: 4px; }
    .sp-card-desc { font-size: 12.5px; line-height: 1.4; color: var(--ink-3); margin-top: 2px; }
    .sp-featured .sp-card { min-height: 160px; padding: 22px; }
    .sp-featured .sp-card-icon { width: 40px; height: 40px; }
    .sp-featured .sp-card-name { font-size: 18px; }
    @media (max-width: 640px) { .sp-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); } }
    .sp-banner { padding: 14px 18px; border: 1px solid var(--rule); border-left: 3px solid var(--seal); border-radius: 6px; background: oklch(98% 0.01 80); font-size: 14px; line-height: 1.45; margin-bottom: 24px; }
    .sp-banner.is-warn { border-left-color: oklch(72% 0.16 50); }
    .sp-banner.is-err { border-left-color: oklch(58% 0.22 25); }
    .sp-banner.is-ok { border-left-color: oklch(60% 0.16 145); }
    .sp-modal-back { position: fixed; inset: 0; background: rgba(20, 20, 20, 0.55); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
    .sp-modal-back.is-open { display: flex; }
    .sp-modal { background: var(--paper); border: 1px solid var(--rule); border-radius: 12px; max-width: 560px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 28px 28px 24px; }
    .sp-modal h3 { font-family: var(--serif); font-size: 22px; line-height: 1.15; margin: 0 0 6px; color: var(--ink); }
    .sp-modal p.sp-modal-desc { font-size: 14px; color: var(--ink-2); margin: 0 0 16px; }
    .sp-modal label { display: block; font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; color: var(--ink-3); text-transform: uppercase; margin: 12px 0 4px; }
    .sp-modal input[type="file"], .sp-modal input[type="text"], .sp-modal input[type="password"], .sp-modal input[type="url"], .sp-modal input[type="number"], .sp-modal select, .sp-modal textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--rule); border-radius: 6px; font: inherit; background: var(--paper); color: var(--ink); }
    .sp-modal input[type="checkbox"] { width: auto; margin-right: 6px; }
    .sp-modal .sp-check { display: flex; align-items: center; gap: 6px; font-family: inherit; font-size: 14px; color: var(--ink-2); text-transform: none; letter-spacing: 0; margin: 8px 0 0; }
    .sp-modal-foot { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }
    .sp-btn-primary { background: var(--seal); color: var(--paper); border: none; padding: 10px 18px; border-radius: 6px; font: inherit; font-size: 14px; cursor: pointer; }

    .sp-result { margin-top: 18px; padding: 14px 16px; background: oklch(98% 0.005 145); border: 1px solid var(--rule); border-radius: 6px; font-size: 13.5px; line-height: 1.5; color: var(--ink); white-space: pre-wrap; word-break: break-word; }
    .sp-progress { font-family: var(--mono); font-size: 12px; color: var(--ink-3); margin-top: 12px; }
    @media (max-width: 640px) { .sp-grid { grid-template-columns: 1fr; } .sp-modal { padding: 20px; } }

</head>

  <script type="module">

    import { renderAppShell } from "./_shared/app-shell.js";

    const SUPABASE_URL = "https://hanxxxtgxofjkfdjegfe.supabase.co";
    const PROXY_PATH = "/functions/v1/pdf-stirling-proxy";

    // ---- Auth gate + sidebar ----
    document.documentElement.classList.add("veylon-auth-pending");
    const session = await requireSession("login.html");
    if (!session) { /* redirige; non eseguire il resto */ throw new Error("redirecting"); }
    await renderAppShell("strumenti");
    document.documentElement.classList.remove("veylon-auth-pending");

    // ---- Tool catalog (98 tool MIT Stirling) ----

    // helper per tool semplice (solo fileInput)
    const _f = (accept="application/pdf") => [{ kind:"file", name:"fileInput", label:"File", required:true, accept }];
    const S = (id, tag, name, desc, endpoint, expects="pdf", fields=null, accept="application/pdf") => ({
      id, tag, name, desc, endpoint, expects, fields: fields || _f(accept)
    });

    const TOOLS = {
      sicurezza: [
        S("add-password","Sicurezza","Aggiungi password","Cifra il PDF con una password di apertura.","/api/v1/security/add-password","pdf",[
          { kind: "file", name: "fileInput", label: "PDF da cifrare", required: true, accept: "application/pdf" },
          { kind: "password", name: "password", label: "Password di apertura", required: true },
          { kind: "password", name: "ownerPassword", label: "Password proprietario (opzionale)" },
          { kind: "select", name: "keyLength", label: "Forza chiave", options: [["256","AES 256 bit"],["128","AES 128 bit"]] },
        ]),
        S("remove-password","Sicurezza","Rimuovi password","Decifra il PDF se conosci la password.","/api/v1/security/remove-password","pdf",[
          { kind: "file", name: "fileInput", label: "PDF cifrato", required: true, accept: "application/pdf" },
          { kind: "password", name: "password", label: "Password attuale", required: true },
        ]),
        S("verify-pdf","Sicurezza","Verifica integrità","Controlla che il PDF non sia corrotto o manomesso.","/api/v1/security/verify-pdf","json"),
        S("cert-sign","Sicurezza","Firma con certificato","Firma digitale visibile con .p12 o coppia chiave/cert.","/api/v1/security/cert-sign","pdf",[
          { kind: "file", name: "fileInput", label: "PDF da firmare", required: true, accept: "application/pdf" },
          { kind: "select", name: "certType", label: "Tipo certificato", options: [["PKCS12","PKCS#12 (.p12)"],["PEM","PEM (chiave + cert)"]] },
          { kind: "file", name: "p12File", label: "File .p12 (se PKCS#12)", accept: ".p12,application/x-pkcs12" },
          { kind: "file", name: "privateKeyFile", label: "Chiave privata .pem (se PEM)", accept: ".pem,.key" },
          { kind: "file", name: "certFile", label: "Certificato .pem (se PEM)", accept: ".pem,.crt,.cer" },
          { kind: "password", name: "password", label: "Password certificato" },
          { kind: "checkbox", name: "showSignature", label: "Mostra rettangolo firma sulla pagina" },
          { kind: "text", name: "reason", label: "Motivo firma" },
          { kind: "text", name: "location", label: "Luogo firma" },
          { kind: "text", name: "name", label: "Nome firmatario" },
        ]),
        S("validate-signature","Sicurezza","Verifica firma","Controlla validita delle firme presenti nel PDF.","/api/v1/security/validate-signature","json"),
        S("remove-cert-sign","Sicurezza","Rimuovi firma","Toglie firme digitali dal PDF (mantiene contenuto).","/api/v1/security/remove-cert-sign","pdf"),
        S("add-watermark","Sicurezza","Aggiungi filigrana","Watermark testuale ripetuto su tutte le pagine.","/api/v1/security/add-watermark","pdf",[
          { kind: "file", name: "fileInput", label: "PDF", required: true, accept: "application/pdf" },
          { kind: "text", name: "watermarkText", label: "Testo filigrana", required: true, placeholder: "RISERVATO" },
          { kind: "number", name: "fontSize", label: "Dimensione font", default: "30" },
          { kind: "number", name: "rotation", label: "Rotazione gradi", default: "45" },
          { kind: "number", name: "opacity", label: "Opacita 0.0-1.0", default: "0.5", step: "0.1" },
          { kind: "number", name: "widthSpacer", label: "Spaziatura larghezza", default: "50" },
          { kind: "number", name: "heightSpacer", label: "Spaziatura altezza", default: "50" },
        ]),
        S("sanitize-pdf","Sicurezza","Sanifica PDF","Rimuove JS, file embedded, metadati. Step automatico Evidence Cloud.","/api/v1/security/sanitize-pdf","pdf",[
          { kind: "file", name: "fileInput", label: "PDF da sanificare", required: true, accept: "application/pdf" },
          { kind: "checkbox", name: "removeJavaScript", label: "Rimuovi JavaScript", default: true },
          { kind: "checkbox", name: "removeEmbeddedFiles", label: "Rimuovi file allegati", default: true },
          { kind: "checkbox", name: "removeMetadata", label: "Rimuovi metadati" },
          { kind: "checkbox", name: "removeLinks", label: "Rimuovi hyperlink" },
          { kind: "checkbox", name: "removeFonts", label: "Rimuovi font embedded" },
        ]),
        S("redact","Sicurezza","Redazione automatica","Oscura parole o regex. Usato per export probatorio GDPR.","/api/v1/security/redact","pdf",[
          { kind: "file", name: "fileInput", label: "PDF", required: true, accept: "application/pdf" },

          { kind: "text", name: "redactColor", label: "Colore (hex)", default: "#000000" },
        ]),
        S("get-info-on-pdf","Sicurezza","Info su PDF","Metadati, versione, pagine, font, firme, allegati.","/api/v1/security/get-info-on-pdf","json"),

        S("html-to-pdf","Conversione","HTML → PDF","Pagina HTML statica (o ZIP con asset) → PDF.","/api/v1/convert/html/pdf","pdf",null,".html,.htm,.zip"),
        S("md-to-pdf","Conversione","Markdown → PDF","Converte testo Markdown formattato in PDF.","/api/v1/convert/markdown/pdf","pdf",null,".md,.markdown,text/markdown"),
        S("eml-to-pdf","Conversione","Email .eml → PDF","Converte email salvate .eml in PDF.","/api/v1/convert/eml/pdf","pdf",null,".eml,message/rfc822"),
        S("ebook-to-pdf","Conversione","Ebook → PDF","EPUB/MOBI/AZW → PDF.","/api/v1/convert/ebook/pdf","pdf",null,".epub,.mobi,.azw,.azw3,.fb2"),
        S("svg-to-pdf","Conversione","SVG → PDF","Grafica vettoriale SVG → PDF.","/api/v1/convert/svg/pdf","pdf",null,".svg,image/svg+xml"),
        S("vector-to-pdf","Conversione","Vector (AI/EPS) → PDF","File vettoriali Adobe Illustrator/EPS → PDF.","/api/v1/convert/vector/pdf","pdf",null,".ai,.eps,.ps"),

        S("pdf-to-img","Conversione","PDF → Immagini","Esporta ogni pagina come PNG/JPEG/WEBP.","/api/v1/convert/pdf/img","zip",[
          { kind: "file", name: "fileInput", label: "PDF", required: true, accept: "application/pdf" },

        S("pdf-to-xml","Conversione","PDF → XML","Struttura PDF in XML.","/api/v1/convert/pdf/xml","xml"),
        S("pdf-to-pdfa","Conversione","PDF → PDF/A","Archiviazione a lungo termine ISO 19005.","/api/v1/convert/pdf/pdfa","pdf",[
          { kind: "file", name: "fileInput", label: "PDF", required: true, accept: "application/pdf" },
          { kind: "select", name: "outputFormat", label: "Variante", options: [["pdfa","PDF/A-1b"],["pdfa-1","PDF/A-1a"],["pdfa-2","PDF/A-2b"],["pdfa-3","PDF/A-3b"]] },

      "layers":       '<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>',
      "overlay":      '<rect x="3" y="3" width="14" height="14" rx="1"/><rect x="7" y="7" width="14" height="14" rx="1" fill="var(--paper)"/>',
      "remove-page":  '<path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6M9 14h6"/>',
      "rearrange":    '<path d="M3 6h13M3 12h13M3 18h13"/><path d="m18 9 3-3-3-3M18 21l3-3-3-3"/>',
      "bookmark":     '<path d="m19 21-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>',
      "list":         '<path d="M3 6h18M3 12h18M3 18h18"/>',
      "type":         '<polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/>',
      "booklet":      '<path d="M12 4v16M3 6c5 0 9 1 9 4M3 6v12c5 0 9 1 9 4M21 6c-5 0-9 1-9 4M21 6v12c-5 0-9 1-9 4"/>',
      // Modifica
      "compress":     '<polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><path d="m14 10 7-7M10 14l-7 7"/>',
      "decompress":   '<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><path d="m21 3-7 7M3 21l7-7"/>',
      "scan":         '<path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="3" y1="12" x2="21" y2="12"/>',
      "number":       '<path d="M4 6h16M4 12h16M4 18h16"/><text x="20" y="9" font-size="5">1</text>',
      "stamp":        '<path d="M10 3h4a3 3 0 0 1 3 3v3H7V6a3 3 0 0 1 3-3z"/><path d="M3 14h18l-2 7H5z"/>',
      "comment":      '<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>',
      "flatten":      '<rect x="3" y="8" width="18" height="8" rx="1"/><line x1="3" y1="20" x2="21" y2="20"/>',
      "broom":        '<path d="M3 21h18M5 17l4-4M9 17l4-4M9 13l8-8 4 4-8 8z"/>',
      "repair":       '<path d="M14 7a4 4 0 1 1-4 4l-7 7v3h3l7-7a4 4 0 0 1 4-4z"/>',
      "rename":       '<path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6M8 14h8"/>',
      "invert":       '<circle cx="12" cy="12" r="9"/><path d="M12 3v18" fill="currentColor"/>',
      "metadata":     '<path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6M8 13h6M8 17h4"/>',
      "image-extract":'<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L8 18"/>',
      "paperclip":    '<path d="M21 12V6a4 4 0 0 0-8 0v10a3 3 0 0 0 6 0V8"/>',
      "code":         '<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>',
      // Analisi/Filtri/Moduli
      "chart":        '<path d="M3 3v18h18M7 16V10M12 16V6M17 16v-3"/>',
      "ruler":        '<path d="M3 17 17 3l4 4L7 21z"/><path d="M7 14l3-3M11 18l2-2"/>',
      "font":         '<polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/>',
      "filter":       '<polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>',
      "form":         '<rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/>',
    };
    const ICON_FOR_TOOL = {
      // Sicurezza
      "add-password":"lock", "remove-password":"unlock", "verify-pdf":"shield-check", "cert-sign":"signature",
      "validate-signature":"shield-check", "remove-cert-sign":"shield-x", "add-watermark":"watermark",
      "sanitize-pdf":"shield", "redact":"redact", "auto-redact":"redact", "get-info-on-pdf":"info",
      // Conversione
      "img-to-pdf":"image", "file-to-pdf":"file", "html-to-pdf":"html", "md-to-pdf":"markdown",
      "eml-to-pdf":"mail", "ebook-to-pdf":"book", "svg-to-pdf":"vector", "vector-to-pdf":"vector",
      "cbr-to-pdf":"comic", "cbz-to-pdf":"comic",
      "pdf-to-word":"file-word", "pdf-to-img":"image", "pdf-to-text":"file-text", "pdf-to-html":"html",
      "pdf-to-markdown":"markdown", "pdf-to-csv":"file-excel", "pdf-to-xlsx":"file-excel",
      "pdf-to-xml":"file-code", "pdf-to-pdfa":"shield", "pdf-to-presentation":"file",
      "pdf-to-vector":"vector", "pdf-to-epub":"book", "pdf-to-cbr":"comic", "pdf-to-cbz":"comic",
      // Pagine
      "merge-pdfs":"merge", "split-pages":"split", "split-by-size-or-count":"split",
      "split-pdf-by-chapters":"split", "split-pdf-by-sections":"split", "split-for-poster-print":"split",
      "rotate-pdf":"rotate", "remove-pages":"remove-page", "rearrange-pages":"rearrange",
      "crop":"crop", "scale-pages":"scale", "pdf-to-single-page":"layers", "multi-page-layout":"layers",
      "booklet-imposition":"booklet", "overlay-pdfs":"overlay", "remove-image-pdf":"image",
      "edit-table-of-contents":"bookmark", "edit-text":"type", "extract-bookmarks":"bookmark",
      // Modifica
      "compress-pdf":"compress", "decompress-pdf":"decompress", "ocr-pdf":"scan",
      "add-page-numbers":"number", "add-image":"image", "add-stamp":"stamp", "add-comments":"comment",
      "flatten":"flatten", "remove-blanks":"broom", "unlock-pdf-forms":"unlock", "repair":"repair",
      "auto-rename":"rename", "auto-split-pdf":"split", "scanner-effect":"scan",
      "replace-invert-pdf":"invert", "update-metadata":"metadata", "extract-images":"image-extract",
      "extract-image-scans":"image-extract", "add-attachments":"paperclip",
      "extract-attachments":"paperclip", "list-attachments":"paperclip",
      "delete-attachment":"paperclip", "rename-attachment":"paperclip", "show-javascript":"code",
      // Analisi
      "basic-info":"info", "document-properties":"info", "page-count":"chart",
      "page-dimensions":"ruler", "font-info":"font", "annotation-info":"comment",
      "security-info":"shield", "form-fields-info":"form",
      // Moduli
      "form-fields":"form", "form-fill":"form", "form-delete-fields":"form",
      "form-modify-fields":"form", "form-extract-csv":"file-excel", "form-extract-xlsx":"file-excel",
      // Filtri
      "filter-page-count":"filter", "filter-page-size":"filter", "filter-file-size":"filter",
      "filter-page-rotation":"filter", "filter-contains-text":"filter", "filter-contains-image":"filter",
    };
    function iconSvg(toolId) {
      const name = ICON_FOR_TOOL[toolId] || "file";
      const path = ICON_PATHS[name] || ICON_PATHS["file"];
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' + path + '</svg>';
    }

    // ---- Featured 5 (in primo piano) ----
    const FEATURED_IDS = ["ocr-pdf","merge-pdfs","compress-pdf","cert-sign","pdf-to-word"];

    // ---- Flatten TOOLS in single list with category key ----
    const ALL_TOOLS = [];
    CATS.forEach((cat) => (TOOLS[cat] || []).forEach((t) => ALL_TOOLS.push(Object.assign({}, t, { _cat: cat }))));

    // ---- State (category filter + search query) ----
    let currentCat = "all";
    let currentQuery = "";

    function renderCard(t, big=false) {
      return `<button class="sp-card" data-tool="${t.id}" type="button" title="${escapeHtml(t.desc)}">
        <span class="sp-card-icon" aria-hidden="true">${iconSvg(t.id)}</span>
        <span class="sp-card-tag">${escapeHtml(t.tag)}</span>
        <span class="sp-card-name">${escapeHtml(t.name)}</span>
        <span class="sp-card-desc">${escapeHtml(t.desc)}</span>
      </button>`;
    }

    function applyFilter() {
      const q = currentQuery.trim().toLowerCase();
      const featuredEl = document.getElementById("sp-featured");
      const featuredSec = document.getElementById("sp-featured-section");
      const allEl = document.getElementById("sp-grid-all");
      const allH = document.getElementById("sp-all-h");

      // Featured visible solo se cat=all e no query
      const showFeatured = (currentCat === "all" && !q);
      featuredSec.hidden = !showFeatured;
      allH.hidden = !showFeatured;
      if (showFeatured) {
        featuredEl.innerHTML = FEATURED_IDS
          .map((id) => ALL_TOOLS.find((t) => t.id === id))
          .filter(Boolean)
          .map((t) => renderCard(t, true))
          .join("");
      }

      const filtered = ALL_TOOLS.filter((t) => {
        if (currentCat !== "all" && t._cat !== currentCat) return false;
        if (!q) return true;
        return (t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || (t.tag||"").toLowerCase().includes(q));
      });

      if (filtered.length === 0) {
        allEl.classList.add("is-empty");
        allEl.innerHTML = "Nessuno strumento corrisponde a “" + escapeHtml(currentQuery) + "”.";
      } else {
        allEl.classList.remove("is-empty");
        allEl.innerHTML = filtered.map((t) => renderCard(t)).join("");
      }
      // Wire click
      [featuredEl, allEl].forEach((root) => {
        root && root.querySelectorAll(".sp-card").forEach((card) => {
          card.addEventListener("click", () => {
            const tool = ALL_TOOLS.find((t) => t.id === card.dataset.tool);
            if (tool) openModal(tool);
          });
        });
      });
    }
    applyFilter();

    // ---- Search input ----
    const searchInput = document.getElementById("sp-search-input");
    let searchTimer = null;
    searchInput.addEventListener("input", (e) => {
      currentQuery = e.target.value;
      clearTimeout(searchTimer);
      searchTimer = setTimeout(applyFilter, 80);
    });

    // ---- Pills (categoria filter) ----
    document.querySelectorAll(".sp-pill").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".sp-pill").forEach((b) => b.classList.remove("is-active"));
        btn.classList.add("is-active");
        currentCat = btn.dataset.cat;
        applyFilter();
      });
    });

    // ---- Modal ----
    const modalBack = document.getElementById("sp-modal-back");
    const modalForm = document.getElementById("sp-modal-form");
    const modalFields = document.getElementById("sp-modal-fields");
    const modalTitle = document.getElementById("sp-modal-title");
    const modalDesc = document.getElementById("sp-modal-desc");
    const modalProgress = document.getElementById("sp-modal-progress");
    const modalResult = document.getElementById("sp-modal-result");
    const modalSubmit = document.getElementById("sp-modal-submit");
    let currentTool = null;

    document.getElementById("sp-modal-close").addEventListener("click", closeModal);
    modalBack.addEventListener("click", (e) => { if (e.target === modalBack) closeModal(); });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape" && modalBack.classList.contains("is-open")) closeModal(); });

    function openModal(tool) {
      currentTool = tool;
      modalTitle.textContent = tool.name;
      modalDesc.textContent = tool.desc;
      modalFields.innerHTML = tool.fields.map(renderField).join("");
      modalProgress.hidden = true; modalProgress.textContent = "";
      modalResult.hidden = true; modalResult.textContent = "";
      modalSubmit.disabled = false; modalSubmit.textContent = "Esegui";
      modalBack.classList.add("is-open");
    }
    function closeModal() {
      modalBack.classList.remove("is-open");
      currentTool = null;
      modalForm.reset();
    }

    function renderField(f) {
      const req = f.required ? "required" : "";
      const def = f.default ?? "";
      const ph = f.placeholder ? `placeholder="${escapeHtml(f.placeholder)}"` : "";
      if (f.kind === "file") {
        const mult = f.multiple ? "multiple" : "";
        return `<label for="f-${f.name}">${escapeHtml(f.label)}${f.required ? " *" : ""}</label>
                <input type="file" id="f-${f.name}" name="${f.name}" accept="${escapeHtml(f.accept||"")}" ${mult} ${req}/>`;
      }
      if (f.kind === "text" || f.kind === "url" || f.kind === "password") {
        return `<label for="f-${f.name}">${escapeHtml(f.label)}${f.required ? " *" : ""}</label>
                <input type="${f.kind}" id="f-${f.name}" name="${f.name}" value="${escapeHtml(String(def))}" ${ph} ${req}/>`;
      }
      if (f.kind === "number") {
        const step = f.step ? `step="${escapeHtml(f.step)}"` : "";
        return `<label for="f-${f.name}">${escapeHtml(f.label)}</label>
                <input type="number" id="f-${f.name}" name="${f.name}" value="${escapeHtml(String(def))}" ${step}/>`;
      }
      if (f.kind === "textarea") {
        const rows = f.rows || 3;
        return `<label for="f-${f.name}">${escapeHtml(f.label)}${f.required ? " *" : ""}</label>
                <textarea id="f-${f.name}" name="${f.name}" rows="${rows}" ${req}>${escapeHtml(String(def))}</textarea>`;
      }
      if (f.kind === "select") {
        const opts = f.options.map(([v, l]) => `<option value="${escapeHtml(v)}">${escapeHtml(l)}</option>`).join("");
        return `<label for="f-${f.name}">${escapeHtml(f.label)}</label>
                <select id="f-${f.name}" name="${f.name}">${opts}</select>`;
      }
      if (f.kind === "checkbox") {
        const checked = f.default ? "checked" : "";
        return `<label class="sp-check"><input type="checkbox" id="f-${f.name}" name="${f.name}" value="true" ${checked}/> ${escapeHtml(f.label)}</label>`;
      }
      return "";
    }

    // ---- Submit ----
    modalForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!currentTool) return;
      modalSubmit.disabled = true; modalSubmit.textContent = "Elaborazione...";
      modalResult.hidden = true; modalResult.textContent = "";
      modalProgress.hidden = false; modalProgress.textContent = "Invio file al motore PDF...";

      try {
        const { data: sess } = await supabase.auth.getSession();
        const accessToken = sess?.session?.access_token;
        if (!accessToken) throw new Error("Sessione scaduta. Effettua di nuovo login.");

        const fd = new FormData();
        for (const f of currentTool.fields) {
          const el = modalForm.elements[f.name];
          if (!el) continue;
          if (f.kind === "file") {
            if (el.files && el.files.length) {
              for (const file of el.files) fd.append(f.name, file, file.name);
            }
          } else if (f.kind === "checkbox") {
            if (el.checked) fd.append(f.name, "true");
            else fd.append(f.name, "false");
          } else {
            if (el.value !== "" && el.value !== null) fd.append(f.name, el.value);
          }
        }

        const proxyUrl = `${SUPABASE_URL}${PROXY_PATH}?endpoint=${encodeURIComponent(currentTool.endpoint)}`;
        const resp = await fetch(proxyUrl, {
          method: "POST",
          headers: { "Authorization": "Bearer " + accessToken },
          body: fd,
        });

        if (resp.status === 503) {
          const j = await safeJson(resp);
          showStatus("warn", j?.message || "Strumenti PDF in attivazione. Stiamo finalizzando il deploy del motore self-hosted. Riprova fra poco.");
          showResult("Servizio in attivazione. Il deploy del motore PDF self-hosted sta per essere completato. Riprova fra qualche minuto.");
          return;
        }
        if (resp.status === 429) {
          showResult("Limite richieste raggiunto (100/h). Riprova fra un'ora.");
          return;
        }
        if (!resp.ok) {
          const j = await safeJson(resp);
          showResult(`Errore ${resp.status}: ${j?.error || j?.message || resp.statusText}`);
          return;
        }

        const ct = (resp.headers.get("content-type") || "").toLowerCase();
        if (ct.includes("application/json")) {
          const j = await resp.json();
          showResult(JSON.stringify(j, null, 2));
        } else {
          // binary -> download
          const blob = await resp.blob();
          const fname = filenameFrom(resp.headers.get("content-disposition")) || suggestedFilename(currentTool);
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url; a.download = fname; document.body.appendChild(a); a.click();
          setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 4000);
          showResult(`File pronto: ${fname}\nDimensione: ${formatBytes(blob.size)}`);
          try { if (window.plausible) window.plausible("strumento_pdf_ok", { props: { tool: currentTool.id } }); } catch(_) {}
        }
      } catch (err) {
        console.error("[strumenti-pdf] submit error", err);
        showResult("Errore: " + (err?.message || String(err)));
      } finally {
        modalSubmit.disabled = false; modalSubmit.textContent = "Esegui";
        modalProgress.hidden = true;
      }
    });

    function showResult(text) {
      modalResult.hidden = false; modalResult.textContent = text;
    }
    function showStatus(kind, msg) {
      const banner = document.getElementById("sp-status");
      banner.className = "sp-banner is-" + kind;
      banner.textContent = msg; banner.hidden = false;
    }
    async function safeJson(r) { try { return await r.json(); } catch { return null; } }
    function filenameFrom(disposition) {
      if (!disposition) return null;
      const m = /filename\*?=(?:UTF-8''|")?([^;"']+)/i.exec(disposition);
      return m ? decodeURIComponent(m[1].replace(/"/g,"")) : null;
    }
    function suggestedFilename(tool) {
      const ext = ({ pdf: "pdf", zip: "zip", docx: "docx", csv: "csv", image: "png", json: "json" })[tool.expects] || "bin";
      const ts = new Date().toISOString().replace(/[:.]/g,"-").slice(0,19);
      return `veylon-${tool.id}-${ts}.${ext}`;
    }
    function formatBytes(b) {
      if (b < 1024) return `${b} B`;
      if (b < 1024*1024) return `${(b/1024).toFixed(1)} KB`;
      return `${(b/1024/1024).toFixed(2)} MB`;
    }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
  </script>
