<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>VEYLON Tag · Emetti</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://hanxxxtgxofjkfdjegfe.supabase.co; script-src 'self' 'unsafe-inline' https://esm.sh https://cdn.skypack.dev https://plausible.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://hanxxxtgxofjkfdjegfe.supabase.co; connect-src 'self' https://hanxxxtgxofjkfdjegfe.supabase.co https://plausible.io; font-src 'self' data: https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none';"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>html.veylon-auth-pending body { visibility: hidden; }</style>
</head>
<body>
  <main class="col" style="padding: 40px 32px 96px;">
    <section class="head-row">
      <div>
        <span class="section-num">Veylon Tag · Emissione</span>
        <h1 class="serif" style="font-size: clamp(38px, 4.6vw, 56px); line-height: 1.05; letter-spacing: -0.02em; margin: 14px 0 18px;">
          Emetti un <em class="serif-italic" style="color: var(--seal);">tag.</em>
        </h1>
        <p class="lede">Genera un QR code univoco da applicare al prodotto.</p>
      </div>
    </section>

    <section style="margin-top: 40px;">
      <article class="panel-card">
        <h2 class="serif" style="font-size: 22px; margin: 0 0 18px;">Nuovo tag</h2>
        <form id="form" novalidate>
          <div>
            <div id="brand-picker-emetti"></div>
          </div>
          <div style="margin-top: 18px;">
            <label class="field-label" for="prod">Denominazione prodotto</label>
            <input class="field-input" type="text" id="prod" required/>
          </div>
          <div style="margin-top: 18px;">
            <label class="field-label" for="sku">SKU / codice interno</label>
            <input class="field-input mono" type="text" id="sku"/>
          </div>
          <div style="margin-top: 18px;">
            <label class="field-label" for="lotto">Lotto / serial</label>
            <input class="field-input mono" type="text" id="lotto"/>
            <!-- Widget template prodotto compact (Stream B) -->
            <div id="tpl-widget-c" class="tpl-widget-c" role="region" aria-label="Applica template prodotto">
              <label for="tpl-select-c">Da template</label>
              <select id="tpl-select-c" aria-label="Seleziona template prodotto">
                <option value="">— Seleziona —</option>
              </select>
            </div>
            <div id="tpl-banner-c" class="tpl-banner-c" role="status" hidden>Template applicato.</div>
          </div>
          <div style="margin-top: 18px;">
            <label class="field-label">Applicazione</label>
            <div role="radiogroup" aria-label="Applicazione" class="radio-row">
              <label class="radio-pill"><input type="radio" name="app" value="qr_adesivo" checked/> QR su adesivo</label>
              <label class="radio-pill"><input type="radio" name="app" value="qr_inciso"/> QR inciso</label>
            </div>
          </div>
          <button type="submit" class="btn seal lg" id="submit" style="margin-top: 24px;">
            <span class="btn-label">Emetti tag</span>
          </button>
          <div id="result" hidden style="margin-top: 20px; padding: 14px; border: 1px solid var(--rule); background: var(--paper-2);">
            <div class="eyebrow seal-c" style="margin-bottom: 6px;">Tag emesso</div>
            <div class="mono" style="font-size: 12px;" id="result-codice"></div>
            <p class="small" id="result-link" style="margin-top: 6px;"></p>
          </div>
        </form>
      </article>
    </section>
  </main>

  <footer class="footer"><div class="footer-base"><span>© MMXXVI · Veylon S.r.l.</span><span>Tag · Emetti</span></div></footer>

  <style>
  .head-row { padding-bottom: 32px; border-bottom: 1px solid var(--ink); }
  .panel-card { background: var(--paper); border: 1px solid var(--rule); padding: 24px 26px; }
  .radio-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .radio-pill { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border: 1px solid var(--rule); cursor: pointer; font-family: var(--serif); font-size: 14px; }
  .radio-pill:hover { background: var(--paper-2); }
  .radio-pill input { accent-color: var(--seal); }

  /* Template widget compact (Stream B) */
  .tpl-widget-c { display: none; margin-top: 10px; gap: 8px; align-items: center; flex-wrap: wrap; }
  .tpl-widget-c.visible { display: flex; }
  .tpl-widget-c label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); }
  .tpl-widget-c select { padding: 6px 10px; font-family: var(--serif); font-size: 13px; border: 1px solid var(--ink); background: var(--paper); max-width: 280px; }
  .tpl-banner-c { background: #e8f5e9; border-left: 3px solid #1e6e3e; padding: 8px 12px; margin-top: 8px; font-family: var(--serif); font-style: italic; font-size: 12.5px; color: #16482a; }
  </style>

  <script type="module">
  import { protectPage, bindLogout } from "./_shared/auth-guard.js";
  import { renderAppShell } from "./_shared/app-shell.js";
  import { supabase } from "./_shared/supabase-client.js";
  import { mountBrandPicker } from "./_shared/brand-picker.js";
  let session;
  document.documentElement.classList.add("veylon-auth-pending");
  try { ({ session } = await protectPage()); } finally { document.documentElement.classList.remove("veylon-auth-pending"); }
  await renderAppShell("tag-emetti");

  // Brand picker (Stream BRAND): selezionabile da anagrafica registrata, no input text liberi.
  let selectedBrand = null;
  let brandPickerHandle = null;
  try {
    brandPickerHandle = await mountBrandPicker("#brand-picker-emetti", {
      supabase,
      required: true,
      allowCreate: true,
      label: "Casa / brand",
      onChange: (b) => { selectedBrand = b; },
    });
  } catch (e) {
    console.warn("brand-picker mount failed:", e?.message || e);
  }

  const SUPABASE_URL = "https://hanxxxtgxofjkfdjegfe.supabase.co";
  const escT = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

  // ============================================================
  // Widget Template Prodotto compact (Stream B)
  // ============================================================
  const tplW = document.getElementById("tpl-widget-c");
  const tplS = document.getElementById("tpl-select-c");
  const tplB = document.getElementById("tpl-banner-c");

  async function tplLoad() {
    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/tag-prodotti-template-list?stato=attivo`, {
        headers: { "Authorization": "Bearer " + session.access_token }
      });
      if (res.status === 404) return; // endpoint non deployato, nascondi gracefully
      if (!res.ok) return;
      const j = await res.json();
      const list = Array.isArray(j) ? j : (j.templates || j.data || []);
      if (!list || list.length === 0) return; // 0 template → nascondi
      tplS.innerHTML = '<option value="">— Seleziona —</option>' +
        list.map((t) => {
          const nome = escT(t.nome || t.name || "Senza nome");
          const cat = escT(t.categoria_dpp || t.categoria_merc || "—");
          const usi = (t.uso_count ?? t.usage_count ?? t.applied_count ?? 0);
          const usiLabel = usi > 0 ? `Usato ${usi}x` : "Mai usato";
          return `<option value="${escT(t.id)}">${nome} — ${cat} — ${usiLabel}</option>`;
        }).join("");
      tplW.classList.add("visible");
    } catch (_) { /* offline → nascondi */ }
  }

  async function tplApplySingolo(id) {
    if (!id) return;
    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/tag-prodotti-template-apply`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + session.access_token },
        body: JSON.stringify({ template_id: id })
      });
      if (res.status === 404) return;
      if (!res.ok) {
        const j = await res.json().catch(() => ({}));
        throw new Error(j.error || ("HTTP " + res.status));
      }
      const j = await res.json();
      const p = j.data || j;
      // Pre-fill SOLO campi rilevanti per emissione singola:
      // descrizione (= prod), applicazione (radio).
      // categoria_dpp / regulatory_compliance / visibility non hanno campo in UI singolo,
      // vengono ignorati come da spec.
      const prodEl = document.getElementById("prod");
      if (p.nome || p.nome_prodotto) prodEl.value = p.nome || p.nome_prodotto;
      const skuEl = document.getElementById("sku");
      if (p.sku_base || p.codice_interno) skuEl.value = p.sku_base || p.codice_interno;
      const app = p.applicazione || p.modello_fisico_default;
      if (app) {
        const radio = document.querySelector(`input[name="app"][value="${app}"]`);
        if (radio) radio.checked = true;
      }
      tplB.hidden = false;
      tplB.textContent = "Template applicato: " + (p.nome || p.nome_prodotto || "—");
    } catch (e) {
      tplB.hidden = false;
      tplB.style.background = "#fde7e4";
      tplB.style.borderLeftColor = "#b00020";
      tplB.style.color = "#5a0a0a";
      tplB.textContent = "Errore template: " + (e.message || e);
    }
  }

  tplS.addEventListener("change", (e) => tplApplySingolo(e.target.value));
  tplLoad();

  document.getElementById("form").addEventListener("submit", async (ev) => {
    ev.preventDefault();
    const payload = {
      descrizione: document.getElementById("prod").value.trim(),
      codice_prodotto: document.getElementById("sku").value.trim() || null,
      lotto: document.getElementById("lotto").value.trim() || null,
      applicazione: document.querySelector('input[name="app"]:checked').value,
      // Stream BRAND: brand selezionato da anagrafica (no input text liberi).
      brand_id: selectedBrand?.id || null,
      brand: selectedBrand?.nome || null,
      brand_vat: selectedBrand?.partita_iva || null,
    };
    if (!payload.descrizione) { alert("Inserisci la descrizione del prodotto."); return; }
    if (!selectedBrand || !selectedBrand.nome) {
      alert("Seleziona un brand dal menu. Se non ce l'hai, clicca '+ Nuovo brand' per crearlo.");
      return;
    }
    const btn = document.getElementById("submit");
    btn.disabled = true;
    const original = btn.querySelector(".btn-label").textContent;
    btn.querySelector(".btn-label").textContent = "Emissione…";
    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/tag-certificato-crea`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + session.access_token },
        body: JSON.stringify(payload),
      });
      const j = await res.json();
      if (!res.ok || !j.success) throw new Error(j?.error || "errore");
      document.getElementById("result-codice").textContent = j.codice_pubblico || j.codice || j.id;
      if (j.url) document.getElementById("result-link").textContent = "Verifica: " + j.url;
      document.getElementById("result").hidden = false;
      document.getElementById("form").reset();
    } catch (e) {
      alert("Errore: " + (e.message || e));
    } finally {
      btn.disabled = false;
      btn.querySelector(".btn-label").textContent = original;
    }
  });
  </script>
  <script>(function(){const o=window.fetch;if(!o||window.__veylonPlausibleHook)return;window.__veylonPlausibleHook=true;window.fetch=function(...a){return o.apply(this,a).then(r=>{try{const u=(a[0]&&a[0].url)||a[0];if(typeof u==='string'&&u.indexOf('/functions/v1/')>0&&r.status>=200&&r.status<300&&window.plausible){const m=u.match(/\/functions\/v1\/([a-z-]+)/);if(m){const fn=m[1];if(['veylon-notarizza','send-create','send-evidence-upload','garanzia-crea','firma-richiedi','cert-emetti','tag-certificato-crea','kyc-onboarding','mail-relay-send'].includes(fn))window.plausible('atto_completato',{props:{atto:'vi_tag',fn:fn}});}}}catch(_){};return r;});};})();</script>
</body>
</html>
