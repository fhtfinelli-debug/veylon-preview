<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>VEYLON Tag · Onboarding produttore</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://hanxxxtgxofjkfdjegfe.supabase.co; script-src 'self' 'unsafe-inline' https://esm.sh https://cdn.skypack.dev https://plausible.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://hanxxxtgxofjkfdjegfe.supabase.co; connect-src 'self' https://hanxxxtgxofjkfdjegfe.supabase.co https://plausible.io; font-src 'self' data: https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none';"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <header class="masthead">
    <div class="masthead-inner">
      <div class="masthead-meta"><span>Area riservata</span><span class="sep">·</span><span>Profilo produttore</span></div>
      <a href="dashboard.html" class="wordmark">VEYLON</a>
      <nav class="masthead-nav full">
        <a href="dashboard.html">Cruscotto</a>
        <a href="tag.html">Tag</a>
        <a href="tag-onboarding.html" class="current">Profilo</a>
        <a href="#" id="logout" class="nav-aux">Esci</a>
      </nav>
    </div>
  </header>

  <main class="col-narrow" style="padding: 40px 32px 96px;">
    <span class="section-num">Veylon Tag · Profilo produttore</span>
    <h1 class="serif" style="font-size: clamp(32px, 4.2vw, 48px); line-height: 1.05; margin: 14px 0 18px;">
      La tua <em class="serif-italic" style="color: var(--seal);">impresa.</em>
    </h1>

    <article class="panel-card" style="margin-top: 32px;">
      <div id="state-loading" class="state-msg">Caricamento profilo&hellip;</div>
      <div id="state-error" class="state-msg state-err" hidden><span></span></div>
      <form id="form" hidden>
        <div>
          <label class="field-label" for="rag">Ragione sociale</label>
          <input class="field-input" type="text" id="rag" required/>
        </div>
        <div style="margin-top: 18px;">
          <label class="field-label" for="piva">P. IVA</label>
          <input class="field-input mono" type="text" id="piva"/>
        </div>
        <div style="margin-top: 18px;">
          <label class="field-label" for="sede">Sede produttiva</label>
          <input class="field-input" type="text" id="sede"/>
        </div>
        <div style="margin-top: 18px;">
          <label class="field-label" for="categoria">Categoria principale</label>
          <input class="field-input" type="text" id="categoria" placeholder="Es. moda, food, design…"/>
        </div>
        <button type="submit" class="btn seal lg" id="submit" style="margin-top: 24px;">
          <span class="btn-label">Salva profilo</span>
        </button>
      </form>
    </article>
  </main>

  <footer class="footer"><div class="footer-base"><span>© MMXXVI · Veylon S.r.l.</span><span>Profilo produttore</span></div></footer>

  <style>
  .panel-card { background: var(--paper); border: 1px solid var(--rule); padding: 28px; }
  .state-msg { padding: 18px 0; color: var(--ink-2); font-family: var(--serif); font-style: italic; font-size: 15px; }
  .state-msg.state-err { color: var(--seal); }
  </style>

  <script type="module">
  import { protectPage, bindLogout } from "./_shared/auth-guard.js";
  import { supabase } from "./_shared/supabase-client.js";
  const { user } = await protectPage();
  bindLogout("#logout");

  let currentId = null;

  async function load() {
    document.getElementById("state-loading").hidden = false;
    document.getElementById("state-error").hidden = true;
    document.getElementById("form").hidden = true;
    try {
      const { data, error } = await supabase
        .from("tag_produttori")
        .select("id, ragione_sociale, partita_iva, sede, categoria")
        .limit(1)
        .maybeSingle();
      document.getElementById("state-loading").hidden = true;
      if (error && !/relation|does not exist/i.test(error.message)) {
        const err = document.getElementById("state-error");
        err.querySelector("span").textContent = "Errore: " + error.message;
        err.hidden = false;
        return;
      }
      if (data) {
        currentId = data.id;
        document.getElementById("rag").value = data.ragione_sociale || "";
        document.getElementById("piva").value = data.partita_iva || "";
        document.getElementById("sede").value = data.sede || "";
        document.getElementById("categoria").value = data.categoria || "";
      }
      document.getElementById("form").hidden = false;
    } catch (e) {
      document.getElementById("state-loading").hidden = true;
      const err = document.getElementById("state-error");
      err.querySelector("span").textContent = "Errore: " + (e.message || e);
      err.hidden = false;
    }
  }

  document.getElementById("form").addEventListener("submit", async (ev) => {
    ev.preventDefault();
    const payload = {
      ragione_sociale: document.getElementById("rag").value.trim(),
      partita_iva: document.getElementById("piva").value.trim() || null,
      sede: document.getElementById("sede").value.trim() || null,
      categoria: document.getElementById("categoria").value.trim() || null,
    };
    if (!payload.ragione_sociale) { alert("Ragione sociale obbligatoria."); return; }
    try {
      let res;
      if (currentId) {
        res = await supabase.from("tag_produttori").update(payload).eq("id", currentId);
      } else {
        res = await supabase.from("tag_produttori").insert({ ...payload, owner_id: user.id });
      }
      if (res.error) throw res.error;
      alert("Profilo salvato.");
      load();
    } catch (e) {
      alert("Errore: " + (e.message || e));
    }
  });
  load();
  </script>
</body>
</html>
