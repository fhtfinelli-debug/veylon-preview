<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>VEYLON Tag · Trasferisci</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://hanxxxtgxofjkfdjegfe.supabase.co; script-src 'self' 'unsafe-inline' https://esm.sh https://cdn.skypack.dev https://plausible.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://hanxxxtgxofjkfdjegfe.supabase.co; connect-src 'self' https://hanxxxtgxofjkfdjegfe.supabase.co https://plausible.io; font-src 'self' data: https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none';"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <header class="masthead">
    <div class="masthead-inner">
      <div class="masthead-meta"><span>Area riservata</span><span class="sep">·</span><span>Tag · Trasferimento</span></div>
      <a href="dashboard.html" class="wordmark">VEYLON</a>
      <nav class="masthead-nav full">
        <a href="dashboard.html">Cruscotto</a>
        <a href="tag.html">Tag</a>
        <a href="tag-trasferisci.html" class="current">Trasferisci</a>
        <a href="#" id="logout" class="nav-aux">Esci</a>
      </nav>
    </div>
  </header>

  <main class="col-narrow" style="padding: 40px 32px 96px;">
    <span class="section-num">Veylon Tag · Trasferimento</span>
    <h1 class="serif" style="font-size: clamp(32px, 4.2vw, 48px); line-height: 1.05; margin: 14px 0 18px;">
      Trasferisci la <em class="serif-italic" style="color: var(--seal);">proprietà.</em>
    </h1>
    <p class="lede">Cessione formale di un tag a un nuovo proprietario.</p>

    <article class="panel-card" style="margin-top: 32px;">
      <form id="form" novalidate>
        <div>
          <label class="field-label" for="tag">Tag da trasferire</label>
          <select id="tag" class="field-input" required><option value="">Caricamento…</option></select>
        </div>
        <div style="margin-top: 18px;">
          <label class="field-label" for="dest">Email nuovo proprietario</label>
          <input class="field-input mono" type="email" id="dest" required/>
        </div>
        <button type="submit" class="btn seal lg" id="submit" style="margin-top: 24px;">
          <span class="btn-label">Trasferisci</span>
        </button>
        <div id="result" hidden style="margin-top: 20px; padding: 14px; border: 1px solid var(--rule); background: var(--paper-2);">
          <div class="eyebrow seal-c" style="margin-bottom: 6px;">Trasferimento avviato</div>
          <p class="small" id="result-msg" style="margin: 0;"></p>
        </div>
      </form>
    </article>
  </main>

  <footer class="footer"><div class="footer-base"><span>© MMXXVI · Veylon S.r.l.</span><span>Tag · Trasferimento</span></div></footer>

  <style>
  .panel-card { background: var(--paper); border: 1px solid var(--rule); padding: 28px; }
  </style>

  <script type="module">
  import { protectPage, bindLogout } from "./_shared/auth-guard.js";
  import { supabase } from "./_shared/supabase-client.js";
  const { session } = await protectPage();
  bindLogout("#logout");

  const SUPABASE_URL = "https://hanxxxtgxofjkfdjegfe.supabase.co";
  function escapeHtml(s) { return String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }

  async function loadOpts() {
    const sel = document.getElementById("tag");
    const { data, error } = await supabase
      .from("tag_prodotti")
      .select("id, denominazione, codice")
      .eq("stato", "attivo")
      .order("created_at", { ascending: false })
      .limit(200);
    if (error || !data || data.length === 0) {
      sel.innerHTML = '<option value="">Nessun tag trasferibile</option>';
      sel.disabled = true;
      return;
    }
    sel.innerHTML = '<option value="">Seleziona un tag…</option>' +
      data.map(t => `<option value="${escapeHtml(t.id)}">${escapeHtml(t.denominazione || t.codice || t.id)}</option>`).join("");
  }

  document.getElementById("form").addEventListener("submit", async (ev) => {
    ev.preventDefault();
    const id = document.getElementById("tag").value;
    const dest = document.getElementById("dest").value.trim();
    if (!id || !dest) { alert("Compila i campi."); return; }
    const btn = document.getElementById("submit");
    btn.disabled = true;
    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/tag-trasferisci`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + session.access_token },
        body: JSON.stringify({ tag_id: id, nuovo_proprietario_email: dest }),
      });
      const j = await res.json();
      if (!res.ok || !j.success) throw new Error(j?.error || "errore");
      document.getElementById("result-msg").textContent =
        "Il nuovo proprietario ha ricevuto un invito a confermare il trasferimento.";
      document.getElementById("result").hidden = false;
      document.getElementById("form").reset();
      loadOpts();
    } catch (e) {
      alert("Errore: " + (e.message || e));
    } finally {
      btn.disabled = false;
    }
  });
  loadOpts();
  </script>
</body>
</html>
